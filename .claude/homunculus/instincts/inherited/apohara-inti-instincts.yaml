# Apohara Inti Workflow Feature Implementation With Tests

## Action

Follow the feature-implementation-with-tests workflow:
1. Implement feature logic in backend or frontend source files.
2. Add or update corresponding test files to cover the new logic.
3. Update related files (e.g., API routes, helpers, or UI components) as needed.
4. Run tests to verify correctness.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: packages/backend/*.py, packages/backend/tests/test_*.py, packages/frontend/src/*.tsx

