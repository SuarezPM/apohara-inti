[project]
name = "apohara-probant-backend"
version = "0.2.0"
description = "Backend FastAPI service for Apohara PROBANT — Gemini writer + 9-vendor adversarial ensemble + INV-15 memory isolation + Veea LobsterTrap DPI"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "pydantic>=2.0",
  "google-genai>=1.0",
  "rfc3161-client>=1.0.6",
  "apohara-aegis @ git+https://github.com/SuarezPM/apohara-aegis.git@main",
  "apohara-context-forge @ git+https://github.com/SuarezPM/Apohara_Context_Forge.git@main",
]

[project.optional-dependencies]
dev = ["pytest>=9.0", "pytest-asyncio>=0.24", "httpx>=0.27"]

[tool.setuptools]
# Flat-layout module list — explicit since US-006+P1+P3+US-RAPTOR+US-GUARD
# added modules alongside main.py, which trips setuptools auto-discovery.
py-modules = [
  "main",
  "lobstertrap_client",
  "rate_limiter",
  "envelope",
  "verdict_vault",
  "judge_gates",
  "rule_of_two",
  "capability_fingerprint",
  "mcp_server",
]
packages = ["billing", "enterprise"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
markers = [
  "network: marks tests requiring live internet (deselect with -m 'not network')",
]
